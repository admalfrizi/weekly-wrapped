version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: weekly_wrapped_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lokal26}
      POSTGRES_DB: ${DB_NAME:-weekly-wrapped-db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./weekly-wrapped-fe
      dockerfile: Dockerfile
    expose:
      - "3000"
    networks:
      - app-network
  
  backend:
    build:
      context: ./weekly-wrapped-be
    expose:
      - "8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=root
      - DB_PASSWORD=lokal26
      - DB_NAME=weekly-wrapped-db
      - DB_SSLMODE=disable
    depends_on:
      - db
    networks:
      - app-network
  
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: