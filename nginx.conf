events {
    worker_connections 1024;
}

http {
    # Define the Next.js frontend service
    upstream frontend {
        server frontend:3000;
    }

    # Define the Go/Gin backend service
    upstream backend {
        server backend:8080;
    }

    server {
        listen 80;
        
        # Note: For HTTPS (443/TLS), you would uncomment these and provide certificates
        # listen 443 ssl;
        # ssl_certificate /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;

        server_name _;

        # Route all root traffic to Next.js
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route API traffic to Go/Gin
        location /api/v1/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}